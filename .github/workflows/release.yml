name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview without publishing"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Use a PAT so the tag push from semantic-release triggers
          # `publish-on-tag.yml`. Pushes made with the default
          # GITHUB_TOKEN do NOT trigger other workflows.
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2

      - name: Install npm dependencies
        run: bun install

      # semantic-release analyzes commits, bumps version, updates
      # CHANGELOG.md, commits + tags + pushes via PAT. The tag push
      # triggers `publish-on-tag.yml`, which runs dotnet-releaser
      # (NuGet + GitHub release) and the npm publish step.
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            bunx semantic-release --dry-run
          else
            bunx semantic-release
          fi
