name: Publish on Tag

# Triggered by `release.yml` pushing a `v*` tag through the
# RELEASE_PAT (a default GITHUB_TOKEN push would not trigger this).
# Runs dotnet-releaser in its expected tag-push mode so it publishes
# NuGet packages and creates the GitHub release with the
# CHANGELOG section semantic-release just wrote.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # npm Trusted Publishing (OIDC)
  pull-requests: write
  issues: write

jobs:
  publish:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      # Trusted Publishing requires npm >= 11.5.1, which ships with Node 24.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install npm dependencies
        run: bun install

      # .NET: build, pack, publish NuGet, create GitHub Release using
      # the CHANGELOG.md section produced by semantic-release.
      - name: dotnet-releaser
        run: |
          dotnet dotnet-releaser run \
            --nuget-token "${{ secrets.NUGET_TOKEN }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            dotnet-releaser.toml

      - name: Build metano-runtime
        run: cd targets/js/metano-runtime && bun run build

      # Sync npm package version to the tag and publish via npm Trusted
      # Publishing (OIDC). No NPM_TOKEN — the npm CLI picks up the
      # id-token: write OIDC token from the workflow.
      - name: Publish metano-runtime to npm
        run: bash scripts/sync-npm-version.sh
