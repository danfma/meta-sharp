name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview without publishing"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write # npm Trusted Publishing (OIDC)
  pull-requests: write
  issues: write

jobs:
  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      # Trusted Publishing requires npm >= 11.5.1, which ships with Node 24.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install npm dependencies
        run: bun install

      # semantic-release: analyze commits, bump version, update CHANGELOG.md,
      # commit + tag + push, then run dotnet-releaser via the @semantic-release/exec
      # plugin to publish NuGet packages and create the GitHub release using the
      # CHANGELOG section just produced.
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            bunx semantic-release --dry-run
          else
            bunx semantic-release
          fi

      # Resolve the new tag semantic-release just pushed so the npm publish step
      # picks up the right version. Skipped on dry runs.
      - name: Resolve published tag
        if: ${{ inputs.dry_run != true && inputs.dry_run != 'true' }}
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build metano-runtime
        if: ${{ inputs.dry_run != true && inputs.dry_run != 'true' }}
        run: cd targets/js/metano-runtime && bun run build

      - name: Publish metano-runtime to npm
        if: ${{ inputs.dry_run != true && inputs.dry_run != 'true' }}
        env:
          GITHUB_REF_NAME: ${{ steps.tag.outputs.tag }}
        run: bash scripts/sync-npm-version.sh
