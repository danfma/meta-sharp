name: Publish on Tag

# Triggered by `release.yml` pushing a `v*` tag through the
# RELEASE_PAT (a default GITHUB_TOKEN push would not trigger this).
# Two independent jobs publish to .NET / npm in parallel — a failure
# on one ecosystem does not block the other (a duplicate NuGet push,
# for example, leaves the npm job free to ship the matching package).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # npm Trusted Publishing (OIDC)
  pull-requests: write
  issues: write

jobs:
  publish-dotnet:
    name: Publish NuGet + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore .NET tools
        run: dotnet tool restore

      # dotnet-releaser: build NuGet packages, push to NuGet.org, and
      # create the GitHub Release using the CHANGELOG.md section
      # produced by semantic-release in the upstream `release.yml`.
      - name: dotnet-releaser
        run: |
          dotnet dotnet-releaser run \
            --nuget-token "${{ secrets.NUGET_TOKEN }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            dotnet-releaser.toml

  publish-npm:
    name: Publish metano-runtime to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Trusted Publishing requires npm >= 11.5.1, which ships with Node 24.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Install npm dependencies
        run: bun install

      - name: Build metano-runtime
        run: cd targets/js/metano-runtime && bun run build

      # Sync npm package version to the tag and publish via npm Trusted
      # Publishing (OIDC). No NPM_TOKEN — the npm CLI picks up the
      # id-token: write OIDC token from the workflow.
      - name: Publish metano-runtime to npm
        run: bash scripts/sync-npm-version.sh
